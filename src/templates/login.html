{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>Login</h1>

<form action="{{ url_for('users.login') }}" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>

{% endblock %}

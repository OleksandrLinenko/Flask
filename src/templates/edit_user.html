{% extends "base.html" %}

{% block title %}
Edit user
{% endblock %}

{% block content %}

<h1>Edit user</h1>

<form
    action="{{ url_for('hello.update_user', user_id=user.id) }}"
    method="POST"
>
    <input
        type="text"
        name="name"
        value="{{ user.name }}"
        required
    >

    <button type="submit">
        Save
    </button>
</form>

<p>
    <a href="{{ url_for('hello.users') }}">
        Back
    </a>
</p>

{% endblock %}

{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<h1>Register</h1>

<form action="{{ url_for('auth.register') }}" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Register
    </button>

</form>

{% endblock %}
